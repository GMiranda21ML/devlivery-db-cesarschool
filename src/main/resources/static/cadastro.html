<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Dev-livery</title>
    <link rel="stylesheet" href="css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card auth-card-large">
            <a href="login.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Voltar para Login</a>
            
            <div class="logo">
                <i class="fa-solid fa-motorcycle"></i>
                <h1>Dev-livery</h1>
            </div>

            <h2>Criar uma conta</h2>
            <p class="subtitle">Junte-se ao melhor app de delivery para devs</p>

            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchForm('cliente')">Sou Cliente</button>
                <button class="tab-btn" onclick="switchForm('entregador')">Sou Entregador</button>
            </div>

            <form action="login.html" class="auth-form" id="cadastro-form">
                <!-- DADOS GERAIS (Tabela USUARIO e TELEFONE) -->
                <div class="form-section">
                    <h3>Dados Pessoais</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="nome">Nome Completo</label>
                            <input type="text" id="nome" placeholder="Seu nome completo" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="email">E-mail</label>
                            <input type="email" id="email" placeholder="Seu e-mail" required>
                        </div>

                        <div class="form-group">
                            <label for="cpf">CPF</label>
                            <input type="text" id="cpf" placeholder="000.000.000-00" required>
                        </div>

                        <div class="form-group">
                            <label for="telefone">Telefone</label>
                            <input type="tel" id="telefone" placeholder="(00) 00000-0000" required>
                        </div>

                        <div class="form-group full-width">
                            <label for="senha">Senha</label>
                            <input type="password" id="senha" placeholder="Crie uma senha forte" required>
                        </div>
                    </div>
                </div>

                <!-- DADOS DO CLIENTE (Tabela CLIENTE) -->
                <div class="form-section" id="cliente-fields">
                    <h3>Endereço de Entrega</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="cep">CEP</label>
                            <input type="text" id="cep" placeholder="00000-000">
                        </div>
                        
                        <div class="form-group">
                            <label for="rua">Rua</label>
                            <input type="text" id="rua" placeholder="Nome da rua">
                        </div>

                        <div class="form-group">
                            <label for="numero">Número</label>
                            <input type="text" id="numero" placeholder="Ex: 123">
                        </div>

                        <div class="form-group">
                            <label for="bairro">Bairro</label>
                            <input type="text" id="bairro" placeholder="Seu bairro">
                        </div>

                        <div class="form-group">
                            <label for="cidade">Cidade</label>
                            <input type="text" id="cidade" placeholder="Sua cidade">
                        </div>

                        <div class="form-group">
                            <label for="convidado">CPF de quem convidou (Opcional)</label>
                            <input type="text" id="convidado" placeholder="000.000.000-00">
                        </div>
                    </div>
                </div>

                <!-- DADOS DO ENTREGADOR (Tabela ENTREGADOR) -->
                <div class="form-section hidden" id="entregador-fields">
                    <h3>Dados do Veículo</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="veiculo">Tipo de Veículo</label>
                            <select id="veiculo">
                                <option value="" disabled selected>Selecione...</option>
                                <option value="Moto">Moto</option>
                                <option value="Bicicleta">Bicicleta</option>
                                <option value="Carro">Carro</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="placa">Placa (se aplicável)</label>
                            <input type="text" id="placa" placeholder="ABC-1234">
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-primary btn-block">Criar Conta</button>
            </form>

            <div class="auth-footer">
                <p>Já tem uma conta? <a href="login.html">Faça login</a></p>
            </div>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
</body>
</html>
